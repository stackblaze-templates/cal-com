databases:
  - name: calcom-db
    databaseName: calcom
    user: calcom
services:
  - type: web
    name: cal-com
    runtime: docker
    plan: starter
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: calcom-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: CALENDSO_ENCRYPTION_KEY
        generateValue: true
      - key: NEXT_PUBLIC_WEBAPP_URL
        value: https://cal.example.com
